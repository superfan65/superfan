name: 自动日报生成

on:
  schedule:
    # 每天 13:55 UTC (对应温哥华 05:55，提前5分钟运行确保准时)
    - cron: '55 13 * * *'
    # 每天 22:55 UTC (对应温哥华 14:55，提前5分钟运行)
    - cron: '55 22 * * *'
  workflow_dispatch: # 允许手动运行测试

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install requests # 如果你需要爬取数据

      - name: 生成日报 HTML
        run: python generate_report.py

      - name: 自动提交并推送
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "自动更新日报: $(date)" || exit 0
          git push
